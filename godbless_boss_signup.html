<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodBless 公會 Boss 報名系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #171b24;
    --bg3: #1e2330;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555b6e;
    --accent: #5b8dee;
    --accent-bg: rgba(91,141,238,0.12);
    --accent-border: rgba(91,141,238,0.35);
    --gold: #f0b429;
    --gold-bg: rgba(240,180,41,0.12);
    --gold-border: rgba(240,180,41,0.35);
    --red: #e05c5c;
    --red-bg: rgba(224,92,92,0.12);
    --red-border: rgba(224,92,92,0.35);
    --green: #4caf82;
    --green-bg: rgba(76,175,130,0.12);
    --green-border: rgba(76,175,130,0.35);
    --warn: #e09a3a;
    --warn-bg: rgba(224,154,58,0.12);
    --warn-border: rgba(224,154,58,0.35);
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* 頂部裝飾條 */
  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, #5b8dee, #a56ef5, #e05c5c, #f0b429);
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .header {
    margin-bottom: 1.75rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    color: var(--text2);
  }

  /* Nav */
  .nav {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 5px;
  }

  .nav-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .nav-btn:hover { color: var(--text); background: var(--bg3); }
  .nav-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px rgba(91,141,238,0.35);
  }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Card */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
  }

  /* Form */
  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
    margin-top: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="number"], input[type="date"],
  input[type="time"], select, textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input[type="text"], input[type="number"], input[type="date"],
  input[type="time"], select {
    height: 38px;
    padding: 0 11px;
  }

  textarea {
    padding: 9px 11px;
    resize: vertical;
    min-height: 64px;
    line-height: 1.6;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,141,238,0.15);
  }

  select option { background: var(--bg3); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25rem 0;
  }

  /* Boss checkboxes */
  .boss-check { display: flex; gap: 20px; margin-top: 6px; }
  .boss-check label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text);
    margin: 0;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }

  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Buttons */
  .btn {
    padding: 9px 16px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    font-weight: 500;
  }
  .btn:hover { background: var(--bg3); border-color: var(--border2); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }
  .btn-sm { font-size: 12px; padding: 5px 11px; }
  .btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red-border); font-size: 12px; padding: 5px 11px; }
  .btn-success { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }

  /* Alert messages */
  .success-msg {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 1rem;
  }
  .warn-msg {
    background: var(--warn-bg);
    color: var(--warn);
    border: 1px solid var(--warn-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 1rem;
  }
  .notice-bar {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 13px;
    margin-bottom: 1.25rem;
    line-height: 1.7;
  }
  .week-preview-bar {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 13px;
    font-size: 12px;
    color: var(--text2);
    margin-top: 10px;
    line-height: 1.9;
  }
  .req-note { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Time slot rows */
  .time-slot {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .time-slot input[type="date"] { flex: 1.4; min-width: 130px; }
  .time-slot input[type="time"] { flex: 0.9; min-width: 90px; }
  .time-slot .sep { font-size: 13px; color: var(--text3); flex-shrink: 0; }

  /* Week navigation */
  .week-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .week-selector span { font-size: 13px; color: var(--text2); }
  .week-badge {
    display: inline-block;
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius);
    padding: 5px 13px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .week-badge.current {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green-border);
  }

  /* Member cards */
  .member-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: .85rem 1rem;
    margin-bottom: .75rem;
    transition: border-color 0.2s;
  }
  .member-card:hover { border-color: var(--border2); }
  .member-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .member-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .member-info { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .member-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 8px; }
  .member-meta { margin-top: 7px; font-size: 12px; color: var(--text3); line-height: 1.8; }

  /* Count badge */
  .count-badge {
    display: inline-block;
    background: var(--bg3);
    color: var(--text2);
    border-radius: 99px;
    padding: 1px 9px;
    font-size: 12px;
    margin-left: 6px;
    border: 1px solid var(--border);
  }

  /* Team cards */
  .boss-section { margin-bottom: 1.75rem; }
  .boss-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: .85rem;
    letter-spacing: 0.03em;
  }
  .boss-badge.ifrit { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .boss-badge.latus { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); }

  .team-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
    margin-bottom: 1rem;
  }
  .team-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
    flex-wrap: wrap;
    gap: 8px;
  }
  .team-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .team-time { font-size: 12px; color: var(--text2); font-family: 'Share Tech Mono', monospace; }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: .5rem;
  }

  .slot-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 13px;
    min-height: 70px;
    transition: border-color 0.15s, background 0.15s;
  }
  .slot-filled {
    background: var(--bg3);
    cursor: grab;
  }
  .slot-filled:active { cursor: grabbing; }
  .slot-filled:hover { border-color: var(--border2); }
  .slot-empty {
    background: transparent;
    border-style: dashed;
    border-color: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 12px;
  }
  .slot-name { font-weight: 700; color: var(--text); font-size: 13px; }
  .slot-job { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .slot-lv { font-size: 11px; color: var(--text3); }
  .slot-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .badge-pill {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .badge-mage { background: var(--accent-bg); color: var(--accent); }
  .badge-dk { background: var(--green-bg); color: var(--green); }

  .drag-over-slot {
    border: 2px solid var(--accent) !important;
    background: var(--accent-bg) !important;
  }

  .warning-bar {
    background: var(--warn-bg);
    color: var(--warn);
    border: 1px solid var(--warn-border);
    border-radius: var(--radius);
    padding: 6px 11px;
    font-size: 12px;
    margin-bottom: 7px;
  }

  .mini-btn {
    font-size: 10px;
    padding: 2px 7px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    margin-top: 5px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .mini-btn:hover { background: var(--bg2); color: var(--text2); }
  .mini-btn-red { border-color: var(--red-border); color: var(--red); }
  .mini-btn-red:hover { background: var(--red-bg); }

  /* Unassigned pool */
  .unassigned-pool {
    background: var(--bg2);
    border: 1px solid var(--warn-border);
    border-radius: var(--radius-lg);
    padding: .85rem 1rem;
    margin-bottom: 1rem;
  }
  .pool-title { font-size: 13px; color: var(--warn); margin-bottom: .5rem; font-weight: 500; }
  .pool-chips { display: flex; flex-wrap: wrap; gap: 7px; min-height: 32px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    font-size: 12px;
    background: var(--bg3);
    cursor: grab;
    color: var(--text);
    user-select: none;
    transition: border-color 0.15s;
  }
  .chip:active { cursor: grabbing; opacity: 0.7; }

  /* Copy panel */
  .copy-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-size: 13px;
    white-space: pre-wrap;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text2);
    margin-top: .75rem;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.7;
  }

  .panel-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 2.5rem;
    color: var(--text3);
    font-size: 14px;
  }

  .section-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
    .team-grid { grid-template-columns: repeat(2, 1fr); }
    .nav-btn { font-size: 13px; padding: 8px 8px; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="container">

  <div class="header">
    <h1>🍁 GodBless 公會 Boss 報名系統</h1>
    <p>每週 Boss 討伐排隊管理（每週四 08:00 起算）</p>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('signup',this)">報名</button>
    <button class="nav-btn" onclick="showPage('members',this)">報名名單</button>
    <button class="nav-btn" onclick="showPage('teams',this)">自動排隊</button>
  </div>

  <!-- 報名 -->
  <div id="page-signup" class="page active">
    <div id="signup-success" class="success-msg" style="display:none;"></div>
    <div id="signup-warn" class="warn-msg" style="display:none;"></div>
    <div class="card">
      <div class="card-title">填寫報名資料</div>
      <label>遊戲名稱 <span style="color:var(--red)">*</span></label>
      <input type="text" id="input-name" placeholder="輸入你的遊戲名稱">
      <div class="form-row">
        <div>
          <label>職業 <span style="color:var(--red)">*</span></label>
          <select id="input-job">
            <option value="">— 選擇職業 —</option>
            <optgroup label="── 四轉 ──">
              <option value="英雄">英雄</option><option value="聖騎士">聖騎士</option><option value="黑騎士">黑騎士</option>
              <option value="箭神">箭神</option><option value="神射手">神射手</option>
              <option value="大魔導士（火、毒）">大魔導士（火、毒）</option><option value="大魔導士（冰、雷）">大魔導士（冰、雷）</option><option value="主教">主教</option>
              <option value="暗影神偷">暗影神偷</option><option value="夜使者">夜使者</option>
              <option value="拳霸">拳霸</option><option value="槍神">槍神</option>
            </optgroup>
            <optgroup label="── 三轉 ──">
              <option value="十字軍">十字軍</option><option value="騎士">騎士</option><option value="龍騎士">龍騎士</option>
              <option value="遊俠">遊俠</option><option value="狙擊手">狙擊手</option>
              <option value="火毒魔導士">火毒魔導士</option><option value="冰雷魔導士">冰雷魔導士</option><option value="祭司">祭司</option>
              <option value="神偷">神偷</option><option value="暗殺者">暗殺者</option>
              <option value="格鬥家">格鬥家</option><option value="神槍手">神槍手</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label>等級 <span style="color:var(--red)">*</span></label>
          <input type="number" id="input-level" placeholder="例：135" min="1" max="300">
        </div>
      </div>
      <label>想討伐的 Boss <span style="color:var(--red)">*</span></label>
      <div class="boss-check">
        <label><input type="checkbox" id="boss-latus"> 普通拉圖斯</label>
        <label><input type="checkbox" id="boss-ifrit"> 殘暴炎魔</label>
      </div>
      <hr class="divider">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <label style="margin:0;">可以參加的時段 <span style="color:var(--red)">*</span></label>
        <button class="btn btn-sm" onclick="addTimeSlot()">+ 新增時段</button>
      </div>
      <div class="req-note" style="margin-bottom:10px;">填好時段後，系統會自動判斷是哪一週的討伐；跨週時段會自動分拆</div>
      <div id="time-slots"></div>
      <div id="week-preview-bar" class="week-preview-bar" style="display:none;"></div>
      <label>備注（選填）</label>
      <textarea id="input-note" placeholder="例：下班前不方便、希望排在某某一組..."></textarea>
      <div style="margin-top:1.1rem;">
        <button class="btn btn-primary" onclick="submitSignup()" style="width:100%;">送出報名</button>
      </div>
    </div>
  </div>

  <!-- 名單 -->
  <div id="page-members" class="page">
    <div class="notice-bar">⚠️ 人在做，會長在看。請勿隨意修改、刪除或更動他人的報名資訊！</div>
    <div class="week-selector">
      <span>查看週次：</span>
      <button class="btn btn-sm" onclick="changeViewWeek(-1)">&#8592;</button>
      <span class="week-badge" id="members-week-badge"></span>
      <button class="btn btn-sm" onclick="changeViewWeek(1)">&#8594;</button>
    </div>
    <div class="section-row">
      <div><span style="font-size:13px;color:var(--text2);">本週報名會員</span><span class="count-badge" id="member-count">0</span></div>
      <button class="btn btn-sm btn-danger" onclick="clearWeek()">清空此週名單</button>
    </div>
    <div id="member-list"></div>
  </div>

  <!-- 排隊 -->
  <div id="page-teams" class="page">
    <div class="notice-bar">⚠️ 人在做，會長在看。非會長或副會長，請勿隨意修改、刪除或更動隊伍排序，感謝你的配合！</div>
    <div class="week-selector">
      <span>查看週次：</span>
      <button class="btn btn-sm" onclick="changeTeamWeek(-1)">&#8592;</button>
      <span class="week-badge" id="teams-week-badge"></span>
      <button class="btn btn-sm" onclick="changeTeamWeek(1)">&#8594;</button>
    </div>
    <div class="panel-row">
      <button class="btn btn-sm" onclick="generateTeams()">重新自動排隊 ↗</button>
      <button class="btn btn-sm btn-success" onclick="toggleCopyPanel()">一鍵複製公告 ↗</button>
    </div>
    <div id="copy-panel" style="display:none;margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:500;">公告文字</span>
        <button class="btn btn-sm btn-primary" onclick="copyAnnouncement()">複製</button>
      </div>
      <div class="copy-area" id="copy-text"></div>
    </div>
    <div id="unassigned-panel" style="display:none;" class="unassigned-pool">
      <div class="pool-title">未分配成員（可拖曳至空格補入隊伍）</div>
      <div class="pool-chips" id="unassigned-chips"></div>
    </div>
    <div id="teams-output"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal-bg" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border2);padding:1.25rem;width:min(480px,92vw);max-height:85vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem;align-items:center;">
      <span style="font-weight:700;font-size:15px;">編輯報名資料</span>
      <button class="btn btn-sm" onclick="closeEdit()">關閉</button>
    </div>
    <label>遊戲名稱</label><input type="text" id="edit-name">
    <div class="form-row">
      <div>
        <label>職業</label>
        <select id="edit-job">
          <optgroup label="── 四轉 ──">
            <option value="英雄">英雄</option><option value="聖騎士">聖騎士</option><option value="黑騎士">黑騎士</option>
            <option value="箭神">箭神</option><option value="神射手">神射手</option>
            <option value="大魔導士（火、毒）">大魔導士（火、毒）</option><option value="大魔導士（冰、雷）">大魔導士（冰、雷）</option><option value="主教">主教</option>
            <option value="暗影神偷">暗影神偷</option><option value="夜使者">夜使者</option>
            <option value="拳霸">拳霸</option><option value="槍神">槍神</option>
          </optgroup>
          <optgroup label="── 三轉 ──">
            <option value="十字軍">十字軍</option><option value="騎士">騎士</option><option value="龍騎士">龍騎士</option>
            <option value="遊俠">遊俠</option><option value="狙擊手">狙擊手</option>
            <option value="火毒魔導士">火毒魔導士</option><option value="冰雷魔導士">冰雷魔導士</option><option value="祭司">祭司</option>
            <option value="神偷">神偷</option><option value="暗殺者">暗殺者</option>
            <option value="格鬥家">格鬥家</option><option value="神槍手">神槍手</option>
          </optgroup>
        </select>
      </div>
      <div><label>等級</label><input type="number" id="edit-level" min="1" max="300"></div>
    </div>
    <label>想討伐的 Boss</label>
    <div class="boss-check">
      <label><input type="checkbox" id="edit-boss-latus"> 普通拉圖斯</label>
      <label><input type="checkbox" id="edit-boss-ifrit"> 殘暴炎魔</label>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;margin-bottom:4px;">
      <label style="margin:0;">可以參加的時段</label>
      <button class="btn btn-sm" onclick="addEditTimeSlot()">+ 新增時段</button>
    </div>
    <div id="edit-time-slots"></div>
    <label>備注</label><textarea id="edit-note"></textarea>
    <div style="margin-top:1rem;"><button class="btn btn-primary" onclick="saveEdit()" style="width:100%;">儲存修改</button></div>
  </div>
</div>

<script>
const STR_JOBS=['英雄','聖騎士','黑騎士','拳霸','十字軍','騎士','龍騎士','格鬥家'];
const MAGE_JOBS=['大魔導士（火、毒）','大魔導士（冰、雷）','主教','火毒魔導士','冰雷魔導士','祭司'];
const DK_JOBS=['黑騎士','龍騎士'];
const isMage=j=>MAGE_JOBS.includes(j);
const isStr=j=>STR_JOBS.includes(j);
const isDK=j=>DK_JOBS.includes(j);

function toDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getWeekStart(d){
  const dt=new Date(typeof d==='string'?d+'T12:00:00':d);
  if(dt.getDay()===4&&dt.getHours()<8)dt.setDate(dt.getDate()-7);
  dt.setHours(0,0,0,0);
  const day=dt.getDay();
  dt.setDate(dt.getDate()-(day>=4?day-4:day+3));
  return toDateStr(dt);
}
function getWeekDates(wk){
  const s=new Set();const d=new Date(wk+'T00:00:00');
  for(let i=0;i<7;i++){s.add(toDateStr(d));d.setDate(d.getDate()+1);}
  return s;
}
function getISOWeekNum(d){
  const dt=new Date(typeof d==='string'?d+'T12:00:00':d);
  dt.setDate(dt.getDate()+4-(dt.getDay()||7));
  const y1=new Date(dt.getFullYear(),0,1);
  return Math.ceil(((dt-y1)/86400000+1)/7);
}
function fmtWeekLabel(wk,tag=true){
  const thu=new Date(wk+'T00:00:00');
  const wed=new Date(wk+'T00:00:00');wed.setDate(wed.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const cur=getWeekStart(new Date());
  const t=(tag&&wk===cur)?' ⭐ 本週':'';
  return `${thu.getFullYear()} W${String(getISOWeekNum(thu)).padStart(2,'0')}（${fmt(thu)} 週四 ~ ${fmt(wed)} 週三）${t}`;
}

let store={};
let viewMemberWeek=getWeekStart(new Date());
let viewTeamWeek=getWeekStart(new Date());
let editIdx=null,editWeekKey=null;
const drag={src:null};

function getWeekData(wk){if(!store[wk])store[wk]={members:[],teams:[]};return store[wk];}

function groupSlotsByWeek(slots){
  const map=new Map();
  slots.forEach(s=>{
    if(!s.date)return;
    const wk=getWeekStart(s.date);
    if(!map.has(wk))map.set(wk,[]);
    map.get(wk).push(s);
  });
  return map;
}

function updateWeekPreview(){
  const slots=getSlots('time-slots');
  const bar=document.getElementById('week-preview-bar');
  if(!slots.length){bar.style.display='none';return;}
  const map=groupSlotsByWeek(slots);
  if(!map.size){bar.style.display='none';return;}
  const cur=getWeekStart(new Date());
  const lines=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([wk,ss])=>{
    const t=wk===cur?' ⭐ 本週':'';
    return `📅 ${fmtWeekLabel(wk,false)}${t}：${ss.length} 個時段`;
  });
  bar.innerHTML='<strong style="color:var(--text2)">系統偵測到的週次：</strong><br>'+lines.join('<br>');
  bar.style.display='block';
}

function makeTimeSlotRow(dateVal,startVal,endVal){
  const div=document.createElement('div');
  div.className='time-slot';
  div.innerHTML=`<input type="date" value="${dateVal}">
    <input type="time" value="${startVal}">
    <span class="sep">—</span>
    <input type="time" value="${endVal}">
    <button class="btn btn-danger" onclick="this.parentElement.remove();updateWeekPreview()">移除</button>`;
  div.querySelectorAll('input[type=date],input[type=time]').forEach(el=>el.addEventListener('change',updateWeekPreview));
  return div;
}

function addTimeSlot(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('time-slots').appendChild(makeTimeSlotRow(today,'20:00','23:00'));
  updateWeekPreview();
}
function addEditTimeSlot(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('edit-time-slots').appendChild(makeTimeSlotRow(today,'20:00','23:00'));
}

function getSlots(cid){
  return Array.from(document.getElementById(cid).querySelectorAll('.time-slot')).map(el=>{
    const ins=el.querySelectorAll('input');
    return{date:ins[0].value,start:ins[1].value,end:ins[2].value};
  }).filter(s=>s.date&&s.start&&s.end);
}

function fmtSlots(slots){return slots.map(s=>`${s.date} ${s.start}~${s.end}`).join('、');}
function slotsOverlap(a,b){for(const x of a)for(const y of b)if(x.date===y.date&&x.start<y.end&&y.start<x.end)return true;return false;}
function getCommon(group){
  if(!group||!group.length)return[];
  let c=group[0].slots.map(s=>({...s}));
  for(let k=1;k<group.length;k++){
    const n=[];
    for(const a of c)for(const b of group[k].slots){
      if(a.date===b.date){const s=a.start>b.start?a.start:b.start,e=a.end<b.end?a.end:b.end;if(s<e)n.push({date:a.date,start:s,end:e});}
    }
    c=n;
  }
  return c;
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');btn.classList.add('active');
  if(p==='members'){updateMembersWeekBadge();renderMembers();}
  if(p==='teams'){updateTeamsWeekBadge();generateTeams();}
}

function submitSignup(){
  const name=document.getElementById('input-name').value.trim();
  const job=document.getElementById('input-job').value;
  const level=document.getElementById('input-level').value;
  const bossLatus=document.getElementById('boss-latus').checked;
  const bossIfrit=document.getElementById('boss-ifrit').checked;
  const slots=getSlots('time-slots');
  const note=document.getElementById('input-note').value.trim();
  if(!name||!job||!level){alert('請填寫名稱、職業和等級');return;}
  if(!bossLatus&&!bossIfrit){alert('請選擇至少一個 Boss');return;}
  if(!slots.length){alert('請至少填寫一個可參加時段');return;}
  const weekMap=groupSlotsByWeek(slots);
  if(!weekMap.size){alert('無法識別時段的週次，請確認日期是否填寫正確');return;}
  const isBoth=bossLatus&&bossIfrit;let isDup=false;
  weekMap.forEach((wkSlots,wk)=>{
    const wd=getWeekData(wk);
    if(wd.members.some(m=>m.name===name))isDup=true;
    wd.members.push({name,job,level:parseInt(level),bosses:{latus:bossLatus,ifrit:bossIfrit},slots:wkSlots,note});
    wd.teams=[];
  });
  const sm=document.getElementById('signup-success');
  const wm=document.getElementById('signup-warn');
  const weekLabels=[...weekMap.keys()].sort().map(wk=>fmtWeekLabel(wk,false)).join('、');
  sm.textContent=`✓ ${name} 報名成功！已加入 ${[bossLatus?'普通拉圖斯':'',bossIfrit?'殘暴炎魔':''].filter(Boolean).join(' + ')} 名單（${weekLabels}）。`;
  sm.style.display='block';
  if(isDup||isBoth){wm.textContent='若本週要打超過 7 場，請記得準備突襲券喔！';wm.style.display='block';}
  else wm.style.display='none';
  setTimeout(()=>{sm.style.display='none';wm.style.display='none';},6000);
  document.getElementById('input-name').value='';document.getElementById('input-job').value='';
  document.getElementById('input-level').value='';document.getElementById('boss-latus').checked=false;
  document.getElementById('boss-ifrit').checked=false;document.getElementById('time-slots').innerHTML='';
  document.getElementById('input-note').value='';document.getElementById('week-preview-bar').style.display='none';
  addTimeSlot();
}

function updateMembersWeekBadge(){
  const el=document.getElementById('members-week-badge');const cur=getWeekStart(new Date());
  el.textContent=fmtWeekLabel(viewMemberWeek);el.className='week-badge'+(viewMemberWeek===cur?' current':'');
}
function updateTeamsWeekBadge(){
  const el=document.getElementById('teams-week-badge');const cur=getWeekStart(new Date());
  el.textContent=fmtWeekLabel(viewTeamWeek);el.className='week-badge'+(viewTeamWeek===cur?' current':'');
}
function changeViewWeek(dir){const d=new Date(viewMemberWeek+'T00:00:00');d.setDate(d.getDate()+dir*7);viewMemberWeek=toDateStr(d);updateMembersWeekBadge();renderMembers();}
function changeTeamWeek(dir){const d=new Date(viewTeamWeek+'T00:00:00');d.setDate(d.getDate()+dir*7);viewTeamWeek=toDateStr(d);updateTeamsWeekBadge();generateTeams();}

function renderMembers(){
  updateMembersWeekBadge();
  const members=getWeekData(viewMemberWeek).members;
  const el=document.getElementById('member-list');
  document.getElementById('member-count').textContent=members.length;
  if(!members.length){el.innerHTML='<div class="empty-state">此週尚無報名</div>';return;}
  el.innerHTML=members.map((m,i)=>`
    <div class="member-card">
      <div class="member-header">
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-info">${m.job} · Lv.${m.level} · ${[m.bosses.latus?'拉圖斯':'',m.bosses.ifrit?'炎魔':''].filter(Boolean).join(' + ')}</div>
        </div>
        <div class="member-actions">
          <button class="btn btn-sm" onclick="openEdit('${viewMemberWeek}',${i})">編輯</button>
          <button class="btn btn-danger" onclick="removeMember('${viewMemberWeek}',${i})">刪除</button>
        </div>
      </div>
      <div class="member-meta">🕐 ${fmtSlots(m.slots)}${m.note?`<br>📝 ${m.note}`:''}</div>
    </div>`).join('');
}

function removeMember(wk,i){if(confirm(`確定要刪除 ${getWeekData(wk).members[i].name} 的報名資料？`)){getWeekData(wk).members.splice(i,1);getWeekData(wk).teams=[];renderMembers();}}

function openEdit(wk,i){
  editIdx=i;editWeekKey=wk;
  const m=getWeekData(wk).members[i];
  document.getElementById('edit-name').value=m.name;document.getElementById('edit-job').value=m.job;
  document.getElementById('edit-level').value=m.level;document.getElementById('edit-boss-latus').checked=m.bosses.latus;
  document.getElementById('edit-boss-ifrit').checked=m.bosses.ifrit;document.getElementById('edit-note').value=m.note||'';
  const se=document.getElementById('edit-time-slots');se.innerHTML='';
  m.slots.forEach(s=>se.appendChild(makeTimeSlotRow(s.date,s.start,s.end)));
  document.getElementById('edit-modal-bg').style.display='flex';
}
function closeEdit(){document.getElementById('edit-modal-bg').style.display='none';editIdx=null;editWeekKey=null;}
function saveEdit(){
  const name=document.getElementById('edit-name').value.trim();const job=document.getElementById('edit-job').value;
  const level=document.getElementById('edit-level').value;const bossLatus=document.getElementById('edit-boss-latus').checked;
  const bossIfrit=document.getElementById('edit-boss-ifrit').checked;const slots=getSlots('edit-time-slots');
  const note=document.getElementById('edit-note').value.trim();
  if(!name||!job||!level){alert('請填寫必要欄位');return;}
  if(!bossLatus&&!bossIfrit){alert('請選擇至少一個 Boss');return;}
  if(!slots.length){alert('請至少填寫一個時段');return;}
  getWeekData(editWeekKey).members[editIdx]={name,job,level:parseInt(level),bosses:{latus:bossLatus,ifrit:bossIfrit},slots,note};
  getWeekData(editWeekKey).teams=[];closeEdit();renderMembers();alert('✓ 資料已更新');
}
function clearWeek(){if(confirm(`確定要清空 ${fmtWeekLabel(viewMemberWeek)} 的所有報名資料？`)){store[viewMemberWeek]={members:[],teams:[]};renderMembers();}}

function buildTeams(members){
  const result={ifrit:[],latus:[]};
  const usedIfrit=new Set(),usedLatus=new Set();
  const canAdd=(m,g)=>g.every(x=>slotsOverlap(m.slots,x.slots));
  const formTeam=(anchors,pool,bossKey,used)=>{
    let team=[...anchors];
    for(const m of pool){
      if(team.length>=6)break;
      if(used.has(m.name+':'+bossKey)||anchors.find(a=>a.name===m.name))continue;
      if(bossKey==='latus'&&isStr(m.job)&&team.filter(x=>isStr(x.job)).length>=3)continue;
      if(canAdd(m,team))team.push(m);
    }
    return team.length>=2?team:null;
  };
  const ifritPool=members.filter(m=>m.bosses.ifrit);
  for(const dk of ifritPool.filter(m=>isDK(m.job))){
    if(usedIfrit.has(dk.name+':ifrit'))continue;
    const avail=ifritPool.filter(m=>!usedIfrit.has(m.name+':ifrit')&&slotsOverlap(dk.slots,m.slots));
    const mages=avail.filter(m=>isMage(m.job)&&m.name!==dk.name);
    const team=formTeam(mages.length?[dk,mages[0]]:[dk],avail,'ifrit',usedIfrit);
    if(team){const w=[];if(!team.some(m=>isDK(m.job)))w.push('缺少黑騎士');if(!team.some(m=>isMage(m.job)))w.push('缺少法師');team.forEach(m=>usedIfrit.add(m.name+':ifrit'));result.ifrit.push({members:team,warnings:w,bossKey:'ifrit'});}
  }
  for(const anchor of ifritPool.filter(m=>!usedIfrit.has(m.name+':ifrit'))){
    if(usedIfrit.has(anchor.name+':ifrit'))continue;
    const avail=ifritPool.filter(m=>!usedIfrit.has(m.name+':ifrit')&&m.name!==anchor.name&&slotsOverlap(anchor.slots,m.slots));
    if(!avail.length)continue;
    const team=formTeam([anchor],avail,'ifrit',usedIfrit);
    if(team){const w=[];if(!team.some(m=>isDK(m.job)))w.push('缺少黑騎士');if(!team.some(m=>isMage(m.job)))w.push('缺少法師');team.forEach(m=>usedIfrit.add(m.name+':ifrit'));result.ifrit.push({members:team,warnings:w,bossKey:'ifrit'});}
  }
  const latusAdj=members.filter(m=>m.bosses.latus).map(m=>{
    if(!m.bosses.ifrit)return m;
    const it=result.ifrit.find(t=>t.members.some(x=>x.name===m.name));if(!it)return m;
    const common=getCommon(it.members);if(!common.length)return m;
    const adj=m.slots.filter(s=>!common.some(c=>c.date===s.date&&s.start<c.end&&c.start<s.end));
    return adj.length?{...m,slots:adj}:null;
  }).filter(Boolean);
  for(const mg of latusAdj.filter(m=>isMage(m.job))){
    if(usedLatus.has(mg.name+':latus'))continue;
    const avail=latusAdj.filter(m=>!usedLatus.has(m.name+':latus')&&slotsOverlap(mg.slots,m.slots));
    const team=formTeam([mg],avail,'latus',usedLatus);
    if(team){const w=[];if(!team.some(m=>isMage(m.job)))w.push('缺少法師');const sc=team.filter(m=>isStr(m.job)).length;if(sc>=4)w.push('力量系過多（'+sc+'人），命中可能不足');team.forEach(m=>usedLatus.add(m.name+':latus'));result.latus.push({members:team,warnings:w,bossKey:'latus'});}
  }
  for(const anchor of latusAdj.filter(m=>!usedLatus.has(m.name+':latus'))){
    if(usedLatus.has(anchor.name+':latus'))continue;
    const avail=latusAdj.filter(m=>!usedLatus.has(m.name+':latus')&&m.name!==anchor.name&&slotsOverlap(anchor.slots,m.slots));
    if(!avail.length)continue;
    const team=formTeam([anchor],avail,'latus',usedLatus);
    if(team){team.forEach(m=>usedLatus.add(m.name+':latus'));result.latus.push({members:team,warnings:['缺少法師'],bossKey:'latus'});}
  }
  return result;
}

function generateTeams(){
  updateTeamsWeekBadge();
  const wd=getWeekData(viewTeamWeek);
  if(!wd.members.length){document.getElementById('teams-output').innerHTML='<div class="empty-state">此週尚無報名</div>';document.getElementById('unassigned-panel').style.display='none';return;}
  if(!wd.teams.length){const res=buildTeams(wd.members);wd.teams=[...res.ifrit,...res.latus];}
  renderAll();
}

function renderAll(){
  const teams=getWeekData(viewTeamWeek).teams;
  const ifritTeams=teams.filter(t=>t.bossKey==='ifrit');
  const latusTeams=teams.filter(t=>t.bossKey==='latus');
  let html='';
  if(ifritTeams.length){html+=`<div class="boss-section"><span class="boss-badge ifrit">殘暴炎魔</span><div class="req-note" style="margin-bottom:.75rem;">需求：至少一名黑騎士 + 至少一名法師</div>`;ifritTeams.forEach((t,i)=>{html+=buildTeamHTML(t,i,'ifrit');});html+='</div>';}
  if(latusTeams.length){html+=`<div class="boss-section"><span class="boss-badge latus">普通拉圖斯</span><div class="req-note" style="margin-bottom:.75rem;">需求：至少一名法師 · 避免力量系全擠同隊</div>`;latusTeams.forEach((t,i)=>{html+=buildTeamHTML(t,i,'latus');});html+='</div>';}
  if(!html)html='<div class="empty-state">目前報名人數不足（每個時段至少需要 2 人）</div>';
  document.getElementById('teams-output').innerHTML=html;document.getElementById('copy-panel').style.display='none';

  const assignedKeys=new Set(teams.flatMap(t=>t.members.map(m=>m.name+':'+t.bossKey)));
  const unassigned=[];
  getWeekData(viewTeamWeek).members.forEach(m=>{
    if(m.bosses.latus&&!assignedKeys.has(m.name+':latus'))unassigned.push({...m,forBoss:'latus'});
    if(m.bosses.ifrit&&!assignedKeys.has(m.name+':ifrit'))unassigned.push({...m,forBoss:'ifrit'});
  });
  const up=document.getElementById('unassigned-panel');
  if(unassigned.length){
    up.style.display='block';
    document.getElementById('unassigned-chips').innerHTML='';
    unassigned.forEach(m=>{
      const chip=document.createElement('span');chip.className='chip';chip.draggable=true;
      chip.textContent=`${m.name}（${m.job}）`;
      chip.style.borderColor=m.forBoss==='ifrit'?'var(--red-border)':'var(--gold-border)';
      chip.addEventListener('dragstart',e=>{drag.src={name:m.name,boss:m.forBoss,fromPool:true};e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',m.name);});
      document.getElementById('unassigned-chips').appendChild(chip);
    });
  } else up.style.display='none';

  document.querySelectorAll('.slot-card.slot-filled').forEach(el=>{
    el.addEventListener('dragstart',e=>{drag.src={name:el.dataset.name,boss:el.dataset.boss,teamIdx:parseInt(el.dataset.team),fromPool:false};e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',el.dataset.name);});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over-slot');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-slot'));
    el.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();el.classList.remove('drag-over-slot');if(!drag.src||drag.src.name===el.dataset.name)return;handleDropOnFilled(el.dataset.boss,parseInt(el.dataset.team),el.dataset.name);});
  });
  document.querySelectorAll('.slot-card.slot-empty').forEach(el=>{
    el.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';el.classList.add('drag-over-slot');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-slot'));
    el.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();el.classList.remove('drag-over-slot');handleDropOnEmpty(el.dataset.boss,parseInt(el.dataset.team));});
  });
}

function handleDropOnEmpty(bossKey,teamIdx){
  if(!drag.src)return;
  const teams=getWeekData(viewTeamWeek).teams;
  const target=teams.filter(t=>t.bossKey===bossKey)[teamIdx];
  if(!target||target.members.length>=6||target.members.find(m=>m.name===drag.src.name))return;
  if(!drag.src.fromPool){const src=teams.filter(t=>t.bossKey===drag.src.boss)[drag.src.teamIdx];if(src)src.members=src.members.filter(m=>m.name!==drag.src.name);}
  const mem=getWeekData(viewTeamWeek).members.find(m=>m.name===drag.src.name);
  if(mem)target.members.push(mem);drag.src=null;renderAll();
}
function handleDropOnFilled(bossKey,teamIdx,targetName){
  if(!drag.src)return;
  const teams=getWeekData(viewTeamWeek).teams;
  const target=teams.filter(t=>t.bossKey===bossKey)[teamIdx];if(!target)return;
  if(drag.src.fromPool){
    target.members=target.members.filter(m=>m.name!==targetName);
    const mem=getWeekData(viewTeamWeek).members.find(m=>m.name===drag.src.name);if(mem)target.members.push(mem);
  } else {
    const src=teams.filter(t=>t.bossKey===drag.src.boss)[drag.src.teamIdx];if(!src)return;
    const si=src.members.findIndex(m=>m.name===drag.src.name),di=target.members.findIndex(m=>m.name===targetName);
    if(si<0||di<0)return;
    if(src===target)[src.members[si],src.members[di]]=[src.members[di],src.members[si]];
    else{const tmp=src.members[si];src.members[si]=target.members[di];target.members[di]=tmp;}
  }
  drag.src=null;renderAll();
}

function buildTeamHTML(team,idx,bossKey){
  const slots=Array(6).fill(null);team.members.forEach((m,i)=>{if(i<6)slots[i]=m;});
  const common=getCommon(team.members);
  const timeStr=common.length?`${common[0].date} ${common[0].start}~${common[0].end}`:'時間待確認';
  let html=`<div class="team-card"><div class="team-header"><span class="team-title">第 ${idx+1} 隊（${team.members.length}/6 人）</span><span class="team-time">${timeStr}</span></div>`;
  team.warnings.forEach(w=>{html+=`<div class="warning-bar">⚠ ${w}</div>`;});
  html+=`<div class="team-grid">`;
  slots.forEach(m=>{
    if(m){
      const badges=[];
      if(isMage(m.job))badges.push('<span class="badge-pill badge-mage">法</span>');
      if(isDK(m.job))badges.push('<span class="badge-pill badge-dk">黑騎</span>');
      html+=`<div class="slot-card slot-filled" draggable="true" data-name="${m.name}" data-boss="${bossKey}" data-team="${idx}">
        <div class="slot-name">${m.name}</div><div class="slot-job">${m.job}</div><div class="slot-lv">Lv.${m.level}</div>
        <div class="slot-badges">${badges.join('')}</div>
        <button class="mini-btn mini-btn-red" onclick="removeFromTeam('${bossKey}',${idx},'${m.name}')">移出</button>
      </div>`;
    } else {
      html+=`<div class="slot-card slot-empty" data-boss="${bossKey}" data-team="${idx}">待補人</div>`;
    }
  });
  html+=`</div></div>`;return html;
}

function removeFromTeam(bossKey,teamIdx,name){
  const t=getWeekData(viewTeamWeek).teams.filter(x=>x.bossKey===bossKey)[teamIdx];
  if(t)t.members=t.members.filter(m=>m.name!==name);renderAll();
}

function toggleCopyPanel(){
  const p=document.getElementById('copy-panel');
  if(p.style.display==='block'){p.style.display='none';return;}
  generateCopyText();p.style.display='block';
}
function generateCopyText(){
  const teams=getWeekData(viewTeamWeek).teams;
  if(!teams.length){document.getElementById('copy-text').textContent='尚無排隊資料';return;}
  const lines=[`【GodBless 公會 Boss 討伐隊伍配置】`,`📅 ${fmtWeekLabel(viewTeamWeek,false)}`,''];
  ['ifrit','latus'].forEach(bk=>{
    const bt=teams.filter(t=>t.bossKey===bk);if(!bt.length)return;
    lines.push(bk==='ifrit'?'🔴 殘暴炎魔':'🟡 普通拉圖斯');
    bt.forEach((t,i)=>{
      const common=getCommon(t.members);
      const time=common.length?`${common[0].date} ${common[0].start}~${common[0].end}`:'時間待確認';
      lines.push(`  第 ${i+1} 隊｜${time}`);
      t.members.forEach(m=>lines.push(`    • ${m.name}（${m.job} Lv.${m.level}）`));
      const empty=6-t.members.length;if(empty>0)lines.push(`    ⬜ 缺 ${empty} 人`);
      t.warnings.forEach(w=>lines.push(`    ⚠ ${w}`));lines.push('');
    });
  });
  document.getElementById('copy-text').textContent=lines.join('\n');
}
function copyAnnouncement(){
  generateCopyText();
  navigator.clipboard.writeText(document.getElementById('copy-text').textContent).then(()=>{
    const btn=event.target;btn.textContent='已複製！';setTimeout(()=>btn.textContent='複製',2000);
  }).catch(()=>alert('請手動選取文字複製'));
}

addTimeSlot();
updateMembersWeekBadge();
updateTeamsWeekBadge();
</script>
